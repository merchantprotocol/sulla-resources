# netlify.v1-auth.yaml
# Authentication for Netlify API v1
# Uses Bearer token (Personal Access Token)

api:
  name: netlify-v1
  version: v1
  provider: netlify
  base_url: https://api.netlify.com/api/v1

auth:
  type: bearer
  client_secret: "${NETLIFY_TOKEN}"
  # Get from: Netlify -> User Settings -> Applications -> Personal Access Tokens

  token_storage: local
  refresh_automatically: false
