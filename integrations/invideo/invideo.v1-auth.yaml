# invideo.v1-auth.yaml
# Authentication for InVideo AI API v1
# Uses Bearer token (API key)

api:
  name: invideo-v1
  version: v1
  provider: invideo
  base_url: https://api.invideo.io/v1

auth:
  type: bearer
  client_secret: "${INVIDEO_API_KEY}"
  # Get from: https://ai.invideo.io/settings/api

  token_storage: local
  refresh_automatically: false
