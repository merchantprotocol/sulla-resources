# gitlab.v4-auth.yaml
# Authentication for GitLab REST API v4
# Uses Bearer token (Personal Access Token)

api:
  name: gitlab-rest-v4
  version: v4
  provider: gitlab
  base_url: https://gitlab.com/api/v4

auth:
  type: bearer
  client_secret: "${GITLAB_TOKEN}"
  # Get from: GitLab -> Settings -> Access Tokens -> Personal Access Tokens

  headers:
    Content-Type: "application/json"

  token_storage: local
  refresh_automatically: false
