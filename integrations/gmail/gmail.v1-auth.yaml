# gmail.v1-auth.yaml
# Authentication configuration for Gmail API v1
# (Google OAuth 2.0 - Authorization Code flow with PKCE)

api:
  name: gmail-api-v1
  version: v1
  provider: google
  base_url: https://gmail.googleapis.com/gmail/v1

auth:
  type: oauth2
  flow: authorization_code
  client_id: "${GOOGLE_CLIENT_ID}"
  client_secret: "${GOOGLE_CLIENT_SECRET}"
  redirect_uris:
    - "http://localhost:3000/auth/callback"
    - "https://yourapp.com/auth/google/callback"

  authorization_url: https://accounts.google.com/o/oauth2/v2/auth
  token_url: https://oauth2.googleapis.com/token

  pkce: true
  code_challenge_method: S256
  access_type: offline
  prompt: consent

  scopes:
    - https://www.googleapis.com/auth/gmail.readonly           # read messages and settings
    - https://www.googleapis.com/auth/gmail.send               # send messages only
    - https://www.googleapis.com/auth/gmail.compose             # create, read, update drafts and send
    - https://www.googleapis.com/auth/gmail.modify              # all read/write except permanent delete
    - https://www.googleapis.com/auth/gmail.labels              # manage labels
    - https://www.googleapis.com/auth/gmail.settings.basic      # manage filters and forwarding
    - https://www.googleapis.com/auth/gmail.settings.sharing    # manage sharing settings (delegates)
    # - https://mail.google.com/                               # full access including permanent delete

  authorization_params:
    include_granted_scopes: true
    login_hint: ""

  token_storage: local
  refresh_automatically: true
  token_expiry_buffer_seconds: 300
