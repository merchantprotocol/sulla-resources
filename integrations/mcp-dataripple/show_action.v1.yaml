endpoint:
  name: show_action
  description: Inject an action card into a live call transcript. Renders markdown
    content with a header, displayed with a green accent. Use this to surface
    actions taken or recommended during the call.
  path: /tools/call
  method: POST
  auth: required
  transport: mcp
body_params:
  call_id:
    type: integer
    required: true
    description: The ID of the active call.
  header:
    type: string
    required: true
    description: Short title displayed at the top of the action card.
  markdown:
    type: string
    required: true
    description: Markdown-formatted content to render inside the card.
  spoken_at:
    type: string
    required: true
    description: ISO 8601 timestamp indicating where in the transcript timeline this
      card should appear.
