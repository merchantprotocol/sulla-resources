# sentry.v0-auth.yaml
# Authentication for Sentry API v0
# Uses Bearer token (Auth Token)

api:
  name: sentry-v0
  version: v0
  provider: sentry
  base_url: https://sentry.io/api/0

auth:
  type: bearer
  client_secret: "${SENTRY_AUTH_TOKEN}"
  # Get from: Sentry -> Settings -> Auth Tokens -> Create New Token

  token_storage: local
  refresh_automatically: false
