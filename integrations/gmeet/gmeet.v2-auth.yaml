# gmeet.v2-auth.yaml
# Authentication configuration for Google Meet REST API v2
# OAuth 2.0 (same Google OAuth as other Google APIs)

api:
  name: google-meet-v2
  version: v2
  provider: google
  base_url: https://meet.googleapis.com/v2

auth:
  type: oauth2
  flow: authorization_code
  client_id: "${GOOGLE_CLIENT_ID}"
  client_secret: "${GOOGLE_CLIENT_SECRET}"
  redirect_uris:
    - "http://localhost:3000/auth/callback"

  authorization_url: https://accounts.google.com/o/oauth2/v2/auth
  token_url: https://oauth2.googleapis.com/token

  pkce: true
  code_challenge_method: S256
  access_type: offline
  prompt: consent

  scopes:
    - https://www.googleapis.com/auth/meetings.space.created    # manage spaces the app created
    - https://www.googleapis.com/auth/meetings.space.readonly    # read meeting spaces
    # - https://www.googleapis.com/auth/meetings.space.settings  # manage space settings

  token_storage: local
  refresh_automatically: true
  token_expiry_buffer_seconds: 300

api_key_fallback:
  enabled: false
