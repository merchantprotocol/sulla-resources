# lovo.v1-auth.yaml
# Authentication for LOVO AI API v1
# Uses Bearer token (API key)

api:
  name: lovo-v1
  version: v1
  provider: lovo
  base_url: https://api.genny.lovo.ai/api/v1

auth:
  type: bearer
  client_secret: "${LOVO_API_KEY}"
  # Get from: https://app.genny.lovo.ai/settings/api

  token_storage: local
  refresh_automatically: false
