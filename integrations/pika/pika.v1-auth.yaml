# pika.v1-auth.yaml
# Authentication for Pika Labs API v1
# Uses Bearer token (API key)

api:
  name: pika-v1
  version: v1
  provider: pika
  base_url: https://api.pika.art/v1

auth:
  type: bearer
  client_secret: "${PIKA_API_KEY}"
  # Get from: https://pika.art/

  token_storage: local
  refresh_automatically: false
