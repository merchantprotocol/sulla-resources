# shopify.v2024-10-auth.yaml
# Authentication configuration for Shopify Admin API (REST)
# Uses OAuth 2.0 or private app access tokens

api:
  name: shopify-admin
  version: "2024-10"
  provider: shopify
  base_url: https://${SHOPIFY_STORE}.myshopify.com/admin/api/2024-10

auth:
  type: bearer
  client_id: "${SHOPIFY_API_KEY}"
  client_secret: "${SHOPIFY_API_SECRET}"

  # OAuth 2.0 for public apps
  authorization_url: https://${SHOPIFY_STORE}.myshopify.com/admin/oauth/authorize
  token_url: https://${SHOPIFY_STORE}.myshopify.com/admin/oauth/access_token

  scopes:
    - read_products
    - write_products
    - read_orders
    - write_orders
    - read_customers
    - write_customers
    - read_inventory
    - write_inventory
    - read_fulfillments
    - write_fulfillments
    # - read_analytics
    # - read_reports

  token_storage: local
  refresh_automatically: false  # Shopify access tokens don't expire for custom apps
