# suno.v1-auth.yaml
# Authentication for Suno API v1
# Uses Bearer token (API key)

api:
  name: suno-v1
  version: v1
  provider: suno
  base_url: https://api.suno.ai/v1

auth:
  type: bearer
  client_secret: "${SUNO_API_KEY}"
  # Get from: https://suno.com/account

  token_storage: local
  refresh_automatically: false
