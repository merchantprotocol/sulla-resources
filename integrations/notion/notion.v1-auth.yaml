# notion.v1-auth.yaml
# Authentication for Notion API v1 (2022-06-28)
# Uses Bearer token (internal integration token)

api:
  name: notion-v1
  version: v1
  provider: notion
  base_url: https://api.notion.com/v1

auth:
  type: bearer
  client_secret: "${NOTION_API_TOKEN}"
  # Get from: https://www.notion.so/my-integrations → Create new integration
  # Then share target pages/databases with the integration

  token_storage: local
  refresh_automatically: false

default_headers:
  Notion-Version: "2022-06-28"
