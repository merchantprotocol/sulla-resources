# etsy.v3-auth.yaml
# Authentication configuration for Etsy API v3
# Uses API Key (x-api-key) for public endpoints, OAuth 2.0 for private endpoints

api:
  name: etsy
  version: "3"
  provider: etsy
  base_url: https://openapi.etsy.com/v3

auth:
  type: apiKey
  header: x-api-key
  token: "${ETSY_API_KEY}"

  # OAuth 2.0 for private/user-scoped endpoints
  authorization_url: https://www.etsy.com/oauth/connect
  token_url: https://api.etsy.com/v3/public/oauth/token
  client_id: "${ETSY_API_KEY}"
  client_secret: "${ETSY_SHARED_SECRET}"

  scopes:
    - listings_r
    - listings_w
    - transactions_r
    - transactions_w
    - profile_r
    - shops_r
    - shops_w
    - feedback_r
    - address_r
    # - email_r
    # - billing_r

  token_storage: local
  refresh_automatically: true
  code_challenge_method: S256  # Etsy v3 requires PKCE
