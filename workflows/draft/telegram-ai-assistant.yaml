id: workflow-telegram-ai-assistant
name: Telegram AI Assistant (Angie)
description: Voice and text AI assistant via Telegram with Gmail, Calendar, and task management capabilities
version: 1
createdAt: 2026-01-07T00:00:00.000Z
updatedAt: 2026-01-07T00:00:00.000Z
nodes:
  # ============================================
  # TRIGGER: Listen for incoming Telegram messages
  # ============================================
  - id: node-telegram-trigger
    type: workflow
    position:
      x: 100
      y: 100
    data:
      subtype: webhook
      category: trigger
      label: Telegram Trigger
      config:
        triggerType: webhook
        triggerDescription: Listen for incoming Telegram messages (text and voice)
        webhookPath: /telegram/webhook
        httpMethod: POST

  # ============================================
  # SECURITY: Allowlist check
  # ============================================
  - id: node-allowlist-check
    type: workflow
    position:
      x: 100
      y: 220
    data:
      subtype: conditional
      category: flow-control
      label: Check Allowlist
      config:
        conditionType: javascript
        conditionScript: |
          // Check if sender ID is in allowlist
          const allowedIds = ['<chat_id_1>', '<chat_id_2>']; // Replace with authorized Telegram chat IDs
          const senderId = $.trigger.message.from.id;
          return allowedIds.includes(senderId);
        onTrue: node-voice-or-text
        onFalse: node-reject-unauthorized

  - id: node-reject-unauthorized
    type: workflow
    position:
      x: 300
      y: 350
    data:
      subtype: agent
      category: agent
      label: Reject Unauthorized
      config:
        agentId: null
        agentName: null
        additionalPrompt: |
          Send a Telegram message to the unauthorized user:
          "Sorry, you are not authorized to use this assistant."
        orchestratorInstructions: |
          Call the telegram integration to send a message to the sender.
          Use: sulla <account_id>/telegram '{"method":"POST","path":"/sendMessage","body":{"chat_id":"{{sender_id}}","text":"Sorry, you are not authorized to use this assistant."}}'
        successCriteria: Message sent to unauthorized user
        completionContract: Exit after sending rejection message

  # ============================================
  # PROCESS: Extract text or handle voice
  # ============================================
  - id: node-voice-or-text
    type: workflow
    position:
      x: 100
      y: 350
    data:
      subtype: conditional
      category: flow-control
      label: Voice or Text?
      config:
        conditionType: javascript
        conditionScript: |
          // Check if message contains voice
          const message = $.trigger.message;
          return message.voice !== undefined;
        onTrue: node-get-voice-file
        onFalse: node-check-empty-text

  # ============================================
  # VOICE PATH: Get voice file and transcribe
  # ============================================
  - id: node-get-voice-file
    type: workflow
    position:
      x: 300
      y: 450
    data:
      subtype: agent
      category: agent
      label: Get Voice File
      config:
        agentId: null
        agentName: null
        additionalPrompt: null
        orchestratorInstructions: |
          1. Extract the file_id from the voice message: $.trigger.message.voice.file_id
          2. Call Telegram API to get the file:
             sulla <account_id>/telegram '{"method":"GET","path":"/getFile","query":{"file_id":"<file_id>"}}'
          3. Download the file from the file_path returned
          4. Save to temporary location for transcription
        successCriteria: Voice file downloaded and ready for transcription
        completionContract: File saved to temp location

  - id: node-speech-to-text
    type: workflow
    position:
      x: 300
      y: 580
    data:
      subtype: agent
      category: agent
      label: Speech to Text
      config:
        agentId: null
        agentName: null
        additionalPrompt: null
        orchestratorInstructions: |
          Transcribe the voice message using OpenAI Whisper API:
          
          1. Get OpenAI credentials from vault: vault/read_secrets with integrationId: "whisper" or "openai"
          2. Call Whisper API:
             curl -X POST "https://api.openai.com/v1/audio/transcriptions" \
               -H "Authorization: Bearer <API_KEY>" \
               -H "Content-Type: multipart/form-data" \
               -F "file=@<path_to_voice_file>" \
               -F "model=whisper-1"
          3. Extract the transcribed text from response
          4. Store transcribed text as the user's message
        successCriteria: Voice message transcribed to text
        completionContract: Transcribed text available for agent

  # ============================================
  # TEXT PATH: Check if text is empty
  # ============================================
  - id: node-check-empty-text
    type: workflow
    position:
      x: 100
      y: 480
    data:
      subtype: conditional
      category: flow-control
      label: Is Text Empty?
      config:
        conditionType: javascript
        conditionScript: |
          // Check if message text is empty or whitespace only
          const text = $.trigger.message.text || '';
          return text.trim() === '';
        onTrue: node-ignore-empty
        onFalse: node-ai-agent

  - id: node-ignore-empty
    type: workflow
    position:
      x: 300
      y: 600
    data:
      subtype: agent
      category: agent
      label: Ignore Empty
      config:
        agentId: null
        agentName: null
        additionalPrompt: null
        orchestratorInstructions: |
          Empty message received. Do not process further. Exit gracefully.
        successCriteria: Empty message ignored
        completionContract: Exit without sending response

  # ============================================
  # AI AGENT: Process request with tools
  # ============================================
  - id: node-ai-agent
    type: workflow
    position:
      x: 100
      y: 600
    data:
      subtype: agent
      category: agent
      label: AI Assistant (Angie)
      config:
        agentId: ai-assistant
        agentName: Angie
        additionalPrompt: |
          You are Angie, a helpful AI assistant that manages the user's digital life.
          
          Today's date is {{ $now }}.
          
          Guidelines:
          - When fetching emails, filter out any promotional emails.
          - When summarizing emails, include: Sender, Message date, Subject, and brief summary.
          - If the user did not specify a date in the request, assume they are asking for today.
          - Use Baserow tools to answer questions about tasks and contacts.
          - When answering questions about calendar events, filter out events that don't apply to the question.
            For example, if the question is about events for today, only reply with events for today.
            Don't mention future events if it's more than 1 week away.
          
          Available tools:
          - Gmail: Fetch and read emails
          - Google Calendar: View and manage calendar events
          - Baserow Tasks: Query and manage tasks
          - Baserow Contacts: Look up contact information (emails, phone numbers)
          - OpenAI Chat: General conversation and reasoning
          
          Memory: Use window buffer memory to maintain conversation context within the session.
        orchestratorInstructions: |
          Process the user's request using available tools:
          
          1. **For email queries**: Use Gmail integration
             - Filter by INBOX and UNREAD labels
             - Filter by date (use $fromAI("date", "the date after which to fetch messages in format YYYY-MM-DDTHH:MM:SS"))
             - Summarize results following guidelines
          
          2. **For calendar queries**: Use Google Calendar integration
             - Fetch events with fields: summary, start(dateTime)
             - Filter by date range based on user query
             - Only show relevant events (don't mention distant future events)
          
          3. **For task queries**: Use Baserow Tasks tool
             - Query tasks table (tableId: 372174, databaseId: 146496)
             - Filter, create, or update tasks as needed
          
          4. **For contact queries**: Use Baserow Contacts tool
             - Query contacts table (tableId: 372177, databaseId: 146496)
             - Return email addresses, phone numbers, or other contact info
          
          5. **For general conversation**: Use OpenAI Chat Model
             - Maintain context using window buffer memory
             - Session key: user's Telegram chat ID
          
          After processing, format the response appropriately and pass it to the Telegram response node.
        successCriteria: User request processed and response generated
        completionContract: Response text ready to send via Telegram

  # ============================================
  # MEMORY: Window Buffer Memory
  # ============================================
  - id: node-memory-buffer
    type: workflow
    position:
      x: 300
      y: 730
    data:
      subtype: memory
      category: memory
      label: Conversation Memory
      config:
        memoryType: window-buffer
        sessionKey: $.trigger.message.from.id
        sessionIdType: customKey
        maxMessages: 10
        description: |
          Maintains conversation history for each user session.
          Keyed by Telegram chat ID for per-user memory.

  # ============================================
  # RESPONSE: Send reply via Telegram
  # ============================================
  - id: node-telegram-response
    type: workflow
    position:
      x: 100
      y: 730
    data:
      subtype: agent
      category: agent
      label: Send Telegram Response
      config:
        agentId: null
        agentName: null
        additionalPrompt: null
        orchestratorInstructions: |
          Send the AI assistant's response back to the user via Telegram:
          
          1. Get the response text from the AI agent output
          2. Get the chat ID from the original message: $.trigger.message.from.id
          3. Call Telegram API:
             sulla <account_id>/telegram '{
               "method": "POST",
               "path": "/sendMessage",
               "body": {
                 "chat_id": "<chat_id>",
                 "text": "<response_text>",
                 "parse_mode": "Markdown"
               }
             }'
          
          Handle any errors gracefully and continue if the send fails.
        successCriteria: Response sent to user
        completionContract: Exit after sending response

edges:
  - id: edge-trigger-to-allowlist
    source: node-telegram-trigger
    target: node-allowlist-check
    animated: true
    label: Incoming message
  - id: edge-allowlist-to-voice-text
    source: node-allowlist-check
    target: node-voice-or-text
    animated: true
    label: Authorized
  - id: edge-voice-to-get-file
    source: node-voice-or-text
    target: node-get-voice-file
    animated: true
    label: Voice message
  - id: edge-get-file-to-transcribe
    source: node-get-voice-file
    target: node-speech-to-text
    animated: true
    label: Download file
  - id: edge-transcribe-to-agent
    source: node-speech-to-text
    target: node-ai-agent
    animated: true
    label: Transcribed text
  - id: edge-text-to-empty-check
    source: node-voice-or-text
    target: node-check-empty-text
    animated: true
    label: Text message
  - id: edge-empty-to-ignore
    source: node-check-empty-text
    target: node-ignore-empty
    animated: true
    label: Empty
  - id: edge-text-to-agent
    source: node-check-empty-text
    target: node-ai-agent
    animated: true
    label: Has text
  - id: edge-agent-to-memory
    source: node-ai-agent
    target: node-memory-buffer
    animated: true
    label: Store context
  - id: edge-memory-to-response
    source: node-memory-buffer
    target: node-telegram-response
    animated: true
    label: Send response

_status: draft
viewport:
  x: 0
  y: 0
  zoom: 1
