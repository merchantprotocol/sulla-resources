id: workflow-goal-cycle
name: Goal Cycle
description: Reusable goal-setting sub-workflow — runs 7 perspective lenses in parallel, synthesizes a harmonic goal, writes to goals file, then validates through timeline & relevance audit and financial reality audit
version: 2
