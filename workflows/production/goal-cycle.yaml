          The trigger message tells you the time horizon and domain context.
          Determine the domain (human, business, world, or agent) from the trigger.

          Step 1: Call your file_search tool with query "goals-perspectives" to find the goals-perspectives skill file.
          Step 2: Use exec to read the full contents of the SKILL.md file found in step 1.
          Step 3: Return the complete skill content as your output. Do NOT summarize — return the full text.

