  - id: node-pp-read-human-goals
    type: workflow
    position:
      x: 100
      y: 660
    data:
      subtype: agent
      category: agent
      label: Read Human Goals
      config:
        agentId: goal-setter
        agentName: Human Goals Reader
        additionalPrompt: ""
        orchestratorInstructions: |
          Read the human goals journal at ~/sulla/identity/human/goals.md and the human identity file at ~/sulla/identity/human/identity.md. Extract a compressed snapshot of: (1) 2-year vision summary, (2) 13-week arc critical drivers and milestone status, (3) current weekly objectives, (4) daily focus goals, (5) key pain points and emotional state. If the journal doesn't exist, read the identity file only and note that goals haven't been set yet. Output under 500 words.
        successCriteria: Compressed human goals snapshot
        completionContract: Exit when snapshot is complete
  - id: node-pp-read-business-goals
    type: workflow
    position:
      x: 400
      y: 660
    data:
      subtype: agent
      category: agent
      label: Read Business Goals
      config:
        agentId: goal-setter
        agentName: Business Goals Reader
        additionalPrompt: ""
        orchestratorInstructions: |
          Read the business goals journal at ~/sulla/identity/business/goals.md and the business identity file at ~/sulla/identity/business/identity.md. Extract a compressed snapshot of: (1) 2-year vision summary, (2) 13-week arc critical drivers and milestone status, (3) current weekly objectives, (4) daily focus goals, (5) active revenue streams and financial pressures. If the journal doesn't exist, read the identity file only and note that goals haven't been set yet. Output under 500 words.
        successCriteria: Compressed business goals snapshot
        completionContract: Exit when snapshot is complete
  - id: node-pp-read-active-projects
    type: workflow
    position:
      x: 700
      y: 660
    data:
      subtype: agent
      category: agent
      label: Read Active Projects & Ideas
      config:
        agentId: goal-setter
        agentName: Project State Reader
        additionalPrompt: ""
        orchestratorInstructions: |
          Read THREE sources:
          1. ~/sulla/projects/ACTIVE_PROJECTS.md — the current project registry.
             Scan ~/sulla/projects/ for any PROJECT.md files that exist but are NOT
             listed in ACTIVE_PROJECTS.md — these are orphaned projects.
             For each active project: slug, status, priority, purpose.
             For orphaned projects: slug, title, status from frontmatter.

          2. **Active project health** — for each active project in ACTIVE_PROJECTS.md,
             read its PROJECT.md and assess:
             - Is it blocked? (waiting on credentials, external dependency, human decision)
             - Is it in progress? (checklist items being completed)
             - Is it stale? (no progress in 3+ days despite being "active")
             - Is it nearly complete? (most checklist items done)
             - What's the blocker if blocked? (credentials, decision, dependency, unclear)
             Classify each as: progressing | blocked | stale | nearly-complete | complete

          3. ~/sulla/projects/PROJECT_IDEAS.md — the persistent ideas registry.
             If it doesn't exist, note that (first run). If it does exist, extract:
             - Ideas with status "pending" (still proposable)
             - Ideas with status "rejected" and their rejection count
             - Ideas with status "retired" (never propose these again)
             - Any ideas that were previously proposed but not yet responded to
             - Summary stats from the top of the file

          Also read the agent goals journal at ~/sulla/identity/agent/goals.md if it exists. Output a structured report covering project state, project health, and idea history.
        successCriteria: Complete project state + health assessment + idea history report
        completionContract: Exit when report is complete
  - id: node-pp-merge-inputs
    type: workflow
