        agentId: Observer
        orchestratorPrompt: |
          Run the observe workflow for the business domain. FIRST read any real-time observations at ~/sulla/daily-logs/{{YYYY-MM-DD}}/business/observations/ — these are observations collected throughout the day during live conversations. Use them as a starting point and supplement with your own deep observation. Write observation logs to ~/sulla/daily-logs/{{YYYY-MM-DD}}/business/observations/
  - id: node-1773727873275
    type: workflow
    position:
      x: 499.4709585607201
