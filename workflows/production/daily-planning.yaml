    data:
      subtype: merge
      category: flow-control
      label: Merge Human & Business Goals
      config:
        strategy: wait-all
  - id: node-extract-topic-lens
    type: workflow
    position:
      x: 325.82430491373447
      y: 867.9180260317838
    data:
      subtype: agent
      category: agent
      label: Extract Topic Lens
      config:
        agentId: forecaster
        agentName: Topic Lens Extractor
        additionalPrompt: ""
        orchestratorInstructions: |
          Read the human goals at ~/sulla/identity/human/goals.md and the business goals at ~/sulla/identity/business/goals.md. Extract the SUBJECTS and DIRECTIONS — not the goals themselves. For example, if the human goal is 'buy a house in Portland', extract 'housing market — Portland metro'. If the business goal is 'grow SaaS revenue to $50k MRR', extract 'SaaS developer tools market'. Produce a focused topic lens of 3-7 subjects with a one-line explanation of why each matters. This topic lens will guide ALL downstream world observation and forecasting.
        successCriteria: A topic lens with 3-7 focused subjects derived from human and business goals
        completionContract: Exit when topic lens is complete
  - id: node-observe-world
    type: workflow
    position:
      x: 325.929028171118
      y: 985.5317456589474
    data:
      subtype: sub-workflow
      category: flow-control
      label: Observe World (Focused)
      config:
        workflowId: workflow-observe
        awaitResponse: true
        agentId: Observer
        orchestratorPrompt: |
          Run the observe workflow for the world domain. FIRST read any real-time observations at ~/sulla/daily-logs/{{YYYY-MM-DD}}/world/observations/ for any world-relevant observations collected during the day. The topic lens has been extracted from human and business goals — use the topic lens subjects from the previous step to focus your world observations. Only observe conditions relevant to those subjects. Write observation logs to ~/sulla/daily-logs/{{YYYY-MM-DD}}/world/observations/
  - id: node-think-world
    type: workflow
    position:
      x: 332.40658014991874
      y: 1103.9858898127595
    data:
      subtype: sub-workflow
      category: flow-control
      label: Think World
      config:
        workflowId: workflow-thinker
        awaitResponse: true
        agentId: Thinker
        orchestratorPrompt: |
          This thinking process is for the WORLD domain. Analyze observation logs at ~/sulla/daily-logs/*/world/observations/ and write all thinking outputs to ~/sulla/daily-logs/{{YYYY-MM-DD}}/world/thinking/. The identity file is at ~/sulla/identity/world/identity.md.
  - id: node-forecast-world
    type: workflow
    position:
      x: 326.58712431783977
      y: 1225.2581888513128
    data:
      subtype: sub-workflow
      category: flow-control
      label: Forecast World
      config:
        workflowId: workflow-forecaster
        awaitResponse: true
        agentId: forecaster
        orchestratorPrompt: |
          Run the forecaster workflow for the world domain. The topic lens was already extracted upstream — pass it through. World identity file at ~/sulla/identity/world/identity.md. World think outputs at ~/sulla/daily-logs/{{YYYY-MM-DD}}/world/thinking/. Forecasting journal at ~/sulla/identity/world/goals.md.
  - id: node-1773804054485
    type: workflow
    position:
      x: 150
      y: 1380
    data:
      subtype: sub-workflow
      category: flow-control
      label: Observe Agent
      config:
        workflowId: workflow-observe
        awaitResponse: true
        agentId: Observer
        orchestratorPrompt: |
          Run the observe workflow for the agent domain. FIRST read any real-time observations at ~/sulla/daily-logs/{{YYYY-MM-DD}}/agent/observations/ — these are observations collected throughout the day during live conversations, including self-observations about agent performance. The human goals are at ~/sulla/identity/human/goals.md and business goals at ~/sulla/identity/business/goals.md — use these to understand what goals the agent should have been advancing. Write observation logs to ~/sulla/daily-logs/{{YYYY-MM-DD}}/agent/observations/
  - id: node-1773804121904
    type: workflow
    position:
      x: 325
      y: 1530
    data:
      subtype: sub-workflow
      category: flow-control
      label: Think Agent
      config:
        workflowId: workflow-thinker
        awaitResponse: true
        agentId: Thinker
        orchestratorPrompt: |
          This thinking process is for the AGENT domain. Analyze observation logs at ~/sulla/daily-logs/*/agent/observations/ and write all thinking outputs to ~/sulla/daily-logs/{{YYYY-MM-DD}}/agent/thinking/. The identity file is at ~/sulla/identity/agent/identity.md. Load the agent-thinking skill for analysis lenses. Analyze agent performance through: effectiveness assessment, goal advancement, influence effectiveness, relationship health, knowledge/capability gaps, and strategic self-direction.
  - id: node-1773727663008
    type: workflow
    position:
      x: 316.78189868035196
      y: 1678.8259855257645
    data:
      subtype: sub-workflow
      category: flow-control
      label: Goal Set Agent
      config:
        workflowId: workflow-goal-setter
        awaitResponse: true
        agentId: goal-setter
        orchestratorPrompt: |
          Run the goal-setter workflow for the agent domain. Identity file at ~/sulla/identity/agent/identity.md. Think outputs at ~/sulla/daily-logs/{{YYYY-MM-DD}}/agent/thinking/. Goals journal at ~/sulla/identity/agent/goals.md. The agent's goals should focus on: how to better serve the human, how to advance the human's and business's goals more effectively, how to build trust, and how to improve as an assistant.
  - id: node-1773730813990
    type: workflow
    position:
      x: 316.78189868035196
      y: 1830
    data:
      subtype: agent
      category: agent
      label: Agent Prompts
      config:
        agentId: prompt-engineer
        agentName: Prompt Engineer
        additionalPrompt: ""
        orchestratorInstructions: |
          Load the agent-prompts skill and the goals-influence-strategies skill. Read the agent goals at ~/sulla/identity/agent/goals.md (daily + weekly goals), the agent identity file at ~/sulla/identity/agent/identity.md (relationship health, buy-in level), the human goals at ~/sulla/identity/human/goals.md, and the business goals at ~/sulla/identity/business/goals.md. Following the agent-prompts skill process: analyze the goal stack, determine appropriate influence level, match goals to agents, craft injection files, validate against red lines, and write goals.md for each relevant agent. Log all injections written and deferred to ~/sulla/daily-logs/{{YYYY-MM-DD}}/agent/prompts-log.md.
        successCriteria: Injection files written for all relevant agents and prompt log saved
        completionContract: Exit when all injection files and the log are written
  - id: node-cleanup
    type: workflow
    position:
      x: 316
      y: 1980
    data:
      subtype: sub-workflow
      category: flow-control
      label: Clean Up
      config:
        workflowId: workflow-cleanup
        awaitResponse: true
        agentId: Observer
        orchestratorPrompt: |
          Run the daily cleanup workflow. Scan the ~/sulla/ directory for stale files, outdated logs, and temporary artifacts. Archive old daily-logs and remove clearly temporary files. Be conservative — when in doubt, keep.
  - id: node-project-planning
    type: workflow
    position:
      x: 316
      y: 2130
    data:
      subtype: sub-workflow
      category: flow-control
      label: Project Planning
      config:
        workflowId: workflow-project-planning
        awaitResponse: true
        agentId: project-resource-document
        orchestratorPrompt: |
          Run the daily project planning workflow. All goals have been updated earlier in the pipeline — read them for the latest goals. Human goals at ~/sulla/identity/human/goals.md, business goals at ~/sulla/identity/business/goals.md, agent goals at ~/sulla/identity/agent/goals.md. Identity files at ~/sulla/identity/. Active projects at ~/sulla/projects/ACTIVE_PROJECTS.md. Propose the top 3 project ideas to the human for approval before creating anything.
