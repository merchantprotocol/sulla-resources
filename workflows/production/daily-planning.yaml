  - id: node-1773726527762
    type: workflow
    position:
      x: 150
      y: 280
    data:
      subtype: sub-workflow
      category: flow-control
      label: Observe Human
      config:
        workflowId: workflow-observe
        awaitResponse: true
        agentId: Observer
        orchestratorPrompt: |
          Run the observe workflow for the human domain. FIRST read any real-time observations at ~/sulla/daily-logs/{{YYYY-MM-DD}}/human/observations/ — these are observations collected throughout the day during live conversations. Use them as a starting point and supplement with your own deep observation. Write observation logs to ~/sulla/daily-logs/{{YYYY-MM-DD}}/human/observations/
  - id: node-1773726731262
    type: workflow
    position:
      x: 154.2323315142393
      y: 432.64520719639955
    data:
      subtype: sub-workflow
      category: flow-control
      label: Think Human
      config:
        workflowId: workflow-thinker
        awaitResponse: true
        agentId: Thinker
        orchestratorPrompt: |
          This thinking process is for the HUMAN domain. Analyze observation logs at ~/sulla/daily-logs/*/human/observations/ and write all thinking outputs to ~/sulla/daily-logs/{{YYYY-MM-DD}}/human/thinking/. The identity file is at ~/sulla/identity/human/identity.md.
  - id: node-1773803963347
    type: workflow
    position:
      x: 147.88383424288037
      y: 580
    data:
      subtype: sub-workflow
      category: flow-control
      label: Goal Set Human
      config:
        workflowId: workflow-goal-setter
        awaitResponse: true
        agentId: goal-setter
        orchestratorPrompt: |
          Run the goal-setter workflow for the human domain. Identity file at ~/sulla/identity/human/identity.md. Think outputs at ~/sulla/daily-logs/{{YYYY-MM-DD}}/human/thinking/. Goals journal at ~/sulla/identity/human/goals.md.
