id: workflow-content-discovery-opensource
name: Open Source Project Discovery Pipeline
description: Discovers open source projects from GitHub, Reddit, X.com, and other sources. Filters duplicates, scores viral potential, and triggers blog production for top ideas.
version: 2
enabled: true
createdAt: 2026-03-30T00:00:00.000Z
updatedAt: 2026-03-30T14:15:11.857Z
nodes:
  - id: node-1743300000001
    type: workflow
    position:
      x: 400
      y: 100
    data:
      subtype: chat-app
      category: trigger
      label: Start Discovery
      config:
        triggerType: chat-app
        triggerDescription: Manual trigger to start content discovery
  - id: node-1743300000002
    type: workflow
    position:
      x: 400
      y: 220
    data:
      subtype: agent
      category: agent
      label: Load Source Monitor Skill
      config:
        agentId: primary
        agentName: Source Monitor Skill Loader
        additionalPrompt: ""
        orchestratorInstructions: "Load the content-source-monitor skill. This skill defines 4 primary sources (GitHub Trending, opensourceprojects.dev, Reddit r/opensource, X.com #opensource), 4 extended sources (Hacker News, Product Hunt, Gitee, LibreStars), and 6 weighted viral scoring criteria: Universal Appeal 20%, Audience Fit 20%, Lead Gen Potential 20%, Curiosity Gap 15%, Actionability 15%, Differentiation 10%. Minimum score 7/10 to pass, 8/10 triggers blog production."
        successCriteria: Skill loaded and summarized
        completionContract: Exit when skill is loaded
  - id: node-1743300000003
    type: workflow
    position:
      x: 400
      y: 340
    data:
      subtype: agent
      category: agent
      label: Load ICP Context
      config:
        agentId: primary
        agentName: ICP Context Loader
        additionalPrompt: ""
        orchestratorInstructions: "Load the Ideal Customer Profile (ICP) from ~/sulla/projects/marketing-plan/icp.md. Target audience: indie hackers, solopreneurs, developers building SaaS, small business owners wanting AI. Topics: AI, devtools, automation, self-hosting, productivity."
        successCriteria: ICP loaded and summarized
        completionContract: Exit when ICP is loaded
  - id: node-1743300000004
    type: workflow
    position:
      x: 200
      y: 460
    data:
      subtype: agent
      category: agent
      label: GitHub Trending Scanner
      config:
        agentId: primary
        agentName: GitHub Trending Scanner
        additionalPrompt: ""
        orchestratorInstructions: "Scan GitHub Trending (github.com/trending) for open source projects. Filter: must have MIT/Apache/GPL/BSD license, >100 stars. For each project capture: repo name, description, primary language, star count, topic tags. Save results to ~/sulla/daily-logs/2026-03-30/content-discovery/github-ideas.md"
        successCriteria: 10+ GitHub projects listed with details
        completionContract: Exit when github-ideas.md is saved
  - id: node-1743300000005
    type: workflow
    position:
      x: 400
      y: 460
    data:
      subtype: agent
      category: agent
      label: Opensourceprojects.dev Scanner
      config:
        agentId: primary
        agentName: Opensourceprojects.dev Scanner
        additionalPrompt: ""
        orchestratorInstructions: "Scan opensourceprojects.dev for trending open source projects. Capture: project name, description, category, GitHub stars, license. Focus on projects relevant to indie hackers and solopreneurs. Save to ~/sulla/daily-logs/2026-03-30/content-discovery/opensourceprojects-dev-ideas.md"
        successCriteria: 10+ projects listed from opensourceprojects.dev
        completionContract: Exit when opensourceprojects-dev-ideas.md is saved
  - id: node-1743300000006
    type: workflow
    position:
      x: 600
      y: 460
    data:
      subtype: agent
      category: agent
      label: X.com Opensource Scanner
      config:
        agentId: primary
        agentName: X.com Opensource Scanner
        additionalPrompt: ""
        orchestratorInstructions: Scan X.com (twitter.com/hashtag/opensource) for trending open source projects mentioned in the last 24 hours. Extract project names, descriptions, and links. Save to ~/sulla/daily-logs/2026-03-30/content-discovery/twitter-ideas.md
        successCriteria: 10+ projects mentioned on X.com
        completionContract: Exit when twitter-ideas.md is saved
  - id: node-1743300000007
    type: workflow
    position:
      x: 400
      y: 580
    data:
      subtype: agent
      category: agent
      label: Merge & Deduplicate Results
      config:
        agentId: primary
        agentName: Merge & Deduplicate Agent
        additionalPrompt: ""
        orchestratorInstructions: "Merge all source outputs (github-ideas.md, opensourceprojects-dev-ideas.md, twitter-ideas.md). Apply deduplication: 1) Exclude projects covered on merchantprotocol.com in last 90 days, 2) Remove duplicates by repo URL, 3) Remove projects >30 days old, 4) Require open source license. Save to ~/sulla/daily-logs/2026-03-30/content-discovery/filtered-ideas.md"
        successCriteria: Deduplicated list saved to filtered-ideas.md
        completionContract: Exit when filtered-ideas.md is saved
  - id: node-1743300000008
    type: workflow
    position:
      x: 400
      y: 700
    data:
      subtype: agent
      category: agent
      label: Score for Viral Potential
      config:
        agentId: primary
        agentName: Viral Scorer Agent
        additionalPrompt: ""
        orchestratorInstructions: "Score each filtered project on 6 criteria (1-10): 1) Universal Appeal 20%: solves universal problem, 2) Audience Fit 20%: matches indie hacker/solopreneur needs, 3) Lead Gen Potential 20%: attracts business owners, 4) Curiosity Gap 15%: surprising or novel, 5) Actionability 15%: readers can try today, 6) Differentiation 10%: how it beats paid alternatives. Calculate weighted average. Pass: 7.0+. Save to ~/sulla/daily-logs/2026-03-30/content-discovery/scored-ideas.md"
        successCriteria: All projects scored, minimum threshold applied
        completionContract: Exit when scored-ideas.md is saved
  - id: node-1743300000009
    type: workflow
    position:
      x: 400
      y: 820
    data:
      subtype: agent
      category: agent
      label: Filter & Rank Top Ideas
      config:
        agentId: primary
        agentName: Ranker Agent
        additionalPrompt: ""
        orchestratorInstructions: "Extract projects scoring 7.0+, rank by score descending. Take top 10-20. For each: rank, project name, score, repo URL, one-sentence pitch. Save to ~/sulla/daily-logs/2026-03-30/content-discovery/daily-top-ideas.md"
        successCriteria: Top 10-20 ranked ideas saved
        completionContract: Exit when daily-top-ideas.md is saved
  - id: node-1743300000010
    type: workflow
    position:
      x: 400
      y: 940
    data:
      subtype: condition
      category: routing
      label: Check for 8.0+ Projects
      config:
        rules:
          - field: scored_projects
            operator: exists
            value: ""
        combinator: and
        expressions:
          - label: Has 8.0+ Project
            expression: any(p.score >= 8.0 for p in scored_projects)
            targetEdge: edge-10
  - id: node-1743300000011
    type: workflow
    position:
      x: 250
      y: 1060
    data:
      subtype: agent
      category: agent
      label: Trigger Blog Production
      config:
        agentId: primary
        agentName: Blog Trigger Agent
        additionalPrompt: ""
        orchestratorInstructions: "Find highest-scoring project (8.0+) from daily-top-ideas.md. Execute blog-production-pipeline workflow with project details: name, repo_url, description, key_features, target_audience. This automatically creates a blog post."
        successCriteria: Blog production workflow triggered
        completionContract: Exit when blog pipeline is triggered
  - id: node-1743300000012
    type: workflow
    position:
      x: 550
      y: 1060
    data:
      subtype: agent
      category: agent
      label: Log Discovery Complete
      config:
        agentId: primary
        agentName: Log Completion Agent
        additionalPrompt: ""
        orchestratorInstructions: "Create run summary: total sources scanned, projects found, passed 7.0+ threshold, highest score, blog triggered (yes/no). Save to ~/sulla/daily-logs/2026-03-30/content-discovery/run-summary.md"
        successCriteria: Run summary saved
        completionContract: Exit when run summary is saved
