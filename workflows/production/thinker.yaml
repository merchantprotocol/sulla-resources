    data:
      subtype: agent
      category: agent
      label: Life Stage
      config:
        agentId: thinker-worker
        agentName: Life Stage Lens
        additionalPrompt: ""
        orchestratorInstructions: Analyze the observation logs for the domain specified by the orchestrator. Extract signals about current life/career stage, time/energy constraints, resources, risk tolerance, current season (building/consolidating/exploring/recovering). Output to ~/sulla/daily-logs/{{YYYY-MM-DD}}/{domain}/thinking/life-stage.md — replace {domain} with the domain the orchestrator told you to analyze (human, business, world, or agent).
        successCriteria: Markdown analysis with evidence-based observations
        completionContract: Exit when analysis file is complete
  - id: node-1000000000005
    type: workflow
    position:
      x: 188
      y: 240
    data:
      subtype: agent
      category: agent
      label: Goals & Desires
      config:
        agentId: thinker-worker
        agentName: Goals Lens
        additionalPrompt: ""
        orchestratorInstructions: Analyze the observation logs for the domain specified by the orchestrator. Extract stated or strongly implied goals, desires, short-term priorities, long-term vision, wished-for capabilities, what they want agents/tools to handle. Output to ~/sulla/daily-logs/{{YYYY-MM-DD}}/{domain}/thinking/goals.md — replace {domain} with the domain the orchestrator told you to analyze.
        successCriteria: Markdown analysis with evidence-based observations
        completionContract: Exit when analysis file is complete
  - id: node-1000000000006
    type: workflow
    position:
      x: 288
      y: 240
    data:
      subtype: agent
      category: agent
      label: Pains & Obstacles
      config:
        agentId: thinker-worker
        agentName: Pains Lens
        additionalPrompt: ""
        orchestratorInstructions: Analyze the observation logs for the domain specified by the orchestrator. Extract pain points, blockers, recurring frustrations, skill gaps, tool friction, emotional burdens, failed attempts. Output to ~/sulla/daily-logs/{{YYYY-MM-DD}}/{domain}/thinking/pains.md — replace {domain} with the domain the orchestrator told you to analyze.
        successCriteria: Markdown analysis with evidence-based observations
        completionContract: Exit when analysis file is complete
  - id: node-1000000000007
    type: workflow
    position:
      x: 388
      y: 240
    data:
      subtype: agent
      category: agent
      label: Patterns & Habits
      config:
        agentId: thinker-worker
        agentName: Patterns Lens
        additionalPrompt: ""
        orchestratorInstructions: Analyze the observation logs for the domain specified by the orchestrator. Extract daily/weekly rhythms, task approach, learning style, collaboration patterns, priorities vs neglect, procrastination triggers, tool usage habits. Output to ~/sulla/daily-logs/{{YYYY-MM-DD}}/{domain}/thinking/patterns.md — replace {domain} with the domain the orchestrator told you to analyze.
        successCriteria: Markdown analysis with evidence-based observations
        completionContract: Exit when analysis file is complete
  - id: node-1000000000008
    type: workflow
    position:
      x: 488
      y: 240
    data:
      subtype: agent
      category: agent
      label: Transformations
      config:
        agentId: thinker-worker
        agentName: Transformations Lens
        additionalPrompt: ""
        orchestratorInstructions: Analyze the observation logs for the domain specified by the orchestrator. Extract skills being built, mindset shifts, habits forming/breaking, role changes, recent differences vs past. Output to ~/sulla/daily-logs/{{YYYY-MM-DD}}/{domain}/thinking/transformations.md — replace {domain} with the domain the orchestrator told you to analyze.
        successCriteria: Markdown analysis with evidence-based observations
        completionContract: Exit when analysis file is complete
  - id: node-1000000000009
    type: workflow
    position:
      x: 588
      y: 240
    data:
      subtype: agent
      category: agent
      label: Emotional State
      config:
        agentId: thinker-worker
        agentName: Emotional Lens
        additionalPrompt: ""
        orchestratorInstructions: Analyze the observation logs for the domain specified by the orchestrator. Extract observed mood, energy, stress, confidence, burnout/disengagement signals, sources of joy/energy, emotional subtext. Output to ~/sulla/daily-logs/{{YYYY-MM-DD}}/{domain}/thinking/emotional.md — replace {domain} with the domain the orchestrator told you to analyze.
        successCriteria: Markdown analysis with evidence-based observations
        completionContract: Exit when analysis file is complete
  - id: node-1000000000010
    type: workflow
    position:
      x: 688
      y: 240
    data:
      subtype: agent
      category: agent
      label: Financial State
      config:
        agentId: thinker-worker
        agentName: Financial Lens
        additionalPrompt: ""
        orchestratorInstructions: Analyze the observation logs for the domain specified by the orchestrator. Extract financial situation, revenue/spending patterns, pressures, how money influences decisions, financial goals/constraints. Only include with clear evidence — mark speculative inferences. Output to ~/sulla/daily-logs/{{YYYY-MM-DD}}/{domain}/thinking/financial.md — replace {domain} with the domain the orchestrator told you to analyze.
        successCriteria: Markdown analysis with evidence-based observations
        completionContract: Exit when analysis file is complete
  - id: node-1000000000011
    type: workflow
    position:
      x: 788
      y: 240
    data:
      subtype: agent
      category: agent
      label: Related Entities
      config:
        agentId: thinker-worker
        agentName: Entities Lens
        additionalPrompt: ""
        orchestratorInstructions: Analyze the observation logs for the domain specified by the orchestrator. Extract mentions of influencing people/businesses/entities (collaborators, clients, family, competitors). Note nature, direction of influence, dependencies, tensions/alignment. Output to ~/sulla/daily-logs/{{YYYY-MM-DD}}/{domain}/thinking/entities.md — replace {domain} with the domain the orchestrator told you to analyze.
        successCriteria: Markdown analysis with evidence-based observations
        completionContract: Exit when analysis file is complete
  - id: node-1000000000012
    type: workflow
    position:
      x: 888
      y: 240
    data:
      subtype: agent
      category: agent
      label: Irrelevance Filter
      config:
        agentId: thinker-worker
        agentName: Irrelevance Lens
        additionalPrompt: ""
        orchestratorInstructions: Analyze the observation logs for the domain specified by the orchestrator. Identify routine, transient, or low-value observations that should NOT be included in the identity file. List them with brief reasoning why they are irrelevant for long-term planning. Output to ~/sulla/daily-logs/{{YYYY-MM-DD}}/{domain}/thinking/irrelevance.md — replace {domain} with the domain the orchestrator told you to analyze.
        successCriteria: Markdown analysis listing filtered items
        completionContract: Exit when analysis file is complete
  - id: node-1000000000013
    type: workflow
    position:
      x: 988
      y: 240
    data:
      subtype: agent
      category: agent
      label: AI vs Emotional State
      config:
        agentId: thinker-worker
        agentName: AI Efforts Lens
        additionalPrompt: ""
        orchestratorInstructions: Analyze the observation logs for the domain specified by the orchestrator. Examine how AI actions, suggestions, frequency, and style are affecting the observed energy, mood, stress, confidence, and engagement. Identify where AI is genuinely helping vs adding friction. Flag emotional signals showing AI misalignment or over/under-reaching. Note patterns in when AI assistance lands well vs poorly. Output to ~/sulla/daily-logs/{{YYYY-MM-DD}}/{domain}/thinking/ai-vs-emotional-state.md — replace {domain} with the domain the orchestrator told you to analyze.
        successCriteria: Markdown analysis with evidence-based observations
        completionContract: Exit when analysis file is complete
