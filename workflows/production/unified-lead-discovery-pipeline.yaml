id: workflow-unified-lead-discovery
name: Unified Lead Discovery Pipeline
description: Continuous single-business discovery. Reads search history, finds ONE new business, researches company + owners in temp file, adds to CRM, loops every 5 min. External scheduler required.
version: 1
enabled: true
nodes:
  - id: node-1775000000001
    type: workflow
    position:
      x: 400
      y: 100
    data:
      subtype: chat-app
      category: trigger
      label: Lead Discovery Trigger
      config:
        triggerType: chat-app
        triggerDescription: Discover ONE new business, research, import to CRM
  - id: node-1775000000002
    type: workflow
    position:
      x: 400
      y: 220
    data:
      subtype: agent
      category: agent
      label: Load Config + Search History
      config:
        agentId: config-loader
        agentName: Config + History Loader
        additionalPrompt: |
          Load ICP criteria, geographic focus, and search history.

          FILES TO READ:
          1. ~/sulla/skills/lead-prospecting/SKILL.md - ICP criteria, geo focus, rate limits
          2. ~/sulla/projects/leads/search-history.md - Search log, pending searches, completed businesses

          OUTPUT:
          - icp_criteria: Must-have requirements (B2B, 2-200 employees, website, etc.)
          - scoring_rules: 10-point scoring system
          - geo_focus: Primary locations (Coeur d'Alene ID, Spokane WA, etc.)
          - pending_searches: List from search-history.md "Pending Searches" section
          - completed_businesses: List from "Completed Businesses (in CRM)" section
          - currently_researching: From "Active Business File" line

          Exit with this config object.
        orchestratorInstructions: Load ICP config and search history. Output pending searches and completed business list.
        successCriteria: Config loaded with pending searches
        completionContract: Exit when config ready
  - id: node-1775000000003
    type: workflow
    position:
      x: 400
      y: 340
    data:
      subtype: agent
      category: agent
      label: Select Next Search Query
      config:
        agentId: search-selector
        agentName: Search Query Selector
        additionalPrompt: |
          Select the NEXT search to execute from pending searches.

          INPUT:
          - pending_searches: List from previous node
          - completed_businesses: List to avoid duplicates

          TASK:
          1. Parse pending_searches (format: "- [ ] Source: Query")
          2. Pick the FIRST pending search
          3. Extract: source_name, search_query
          4. Validate: Is this query still relevant? (not completed, not currently researching)

          OUTPUT:
          - source_name: e.g., "Google Maps", "Yelp", "Google Search"
          - search_query: e.g., "Spokane professional services"
          - expected_results: Estimated number of results (10-50)

          If NO pending searches remain:
          - Set has_pending: false
          - Exit early with message "No pending searches - add more to search-history.md"
        orchestratorInstructions: Select first pending search from list. Extract source and query.
        successCriteria: Search query selected
        completionContract: Exit with source_name, search_query, or has_pending=false
  - id: node-1775000000004
    type: workflow
    position:
      x: 400
      y: 460
    data:
      subtype: agent
      category: agent
      label: Search ONE Business + Check CRM
      config:
        agentId: business-finder
        agentName: Business Finder + CRM Checker
        additionalPrompt: |
          Find ONE business from search and check if already in CRM.

          INPUT:
          - source_name: e.g., "Google Maps"
          - search_query: e.g., "Spokane professional services"
          - completed_businesses: List of business names already processed

          TASK:
          1. Open browser to {source_name}
          2. Search for: {search_query}
          3. Scroll through results (max 10 businesses)
          4. For EACH business (in order):
             a. Extract: business_name, website, phone, address
             b. Check if business_name OR website is in completed_businesses list
             c. If NOT in list → THIS IS OUR BUSINESS. Stop and return it.
             d. If in list → skip to next business
          5. If all 10 are duplicates → return has_new_business: false

          BOT PREVENTION:
          - If CAPTCHA, Cloudflare, or blocking: exit early with was_blocked: true
          - Use 5-second delay between actions

          OUTPUT (if new business found):
          - business_name
          - website
          - phone
          - address
          - source: source_name
          - has_new_business: true

          OUTPUT (if no new business):
          - has_new_business: false
          - reason: "All results were duplicates" or "No results found"

          Close browser tab before exit.
        orchestratorInstructions: Search source, find first business not in completed list. Return business or has_new_business=false.
        successCriteria: New business found or confirmed no new results
        completionContract: Exit with business data or has_new_business=false
  - id: node-1775000000005
    type: workflow
    position:
      x: 400
      y: 580
    data:
      subtype: agent
      category: agent
      label: Create Temp Working File
      config:
        agentId: file-creator
        agentName: Working File Creator
        additionalPrompt: |
          Create temporary working file for business research.

          INPUT:
          - business_name, website, phone, address, source

          TASK:
          1. Create slug: {business-name-slug} (lowercase, hyphens, no special chars)
          2. Create directories: mkdir -p ~/sulla/projects/leads/working/
          3. Create file: ~/sulla/projects/leads/working/{business-slug}.md
          4. Write initial markdown:

          ```markdown
          # {business_name}

          **Status:** Researching
          **Started:** {current_datetime}
          **Source:** {source}

          ## Basic Info
          - **Website:** {website}
          - **Phone:** {phone}
          - **Address:** {address}

          ## Company Research
          [Pending - next node will fill this]

          ## Owner/Decision Maker Research
          [Pending - next node will fill this]

          ## CRM Import Status
          - Company: Not imported
          - People: Not imported
          ```

          5. Update search-history.md:
             - Change "Currently researching: None" → "Currently researching: {business_name}"

          OUTPUT:
          - working_file_path: Full path to created file
          - business_slug: The slugified name
        orchestratorInstructions: Create temp working file with business basics. Update search-history.md status.
        successCriteria: Working file created, search-history updated
        completionContract: Exit with file path and slug
  - id: node-1775000000006
    type: workflow
    position:
      x: 400
      y: 700
    data:
      subtype: agent
      category: agent
      label: Research Company Details
      config:
        agentId: company-researcher
        agentName: Company Research Agent
        additionalPrompt: |
          Research company details and update working file.

          INPUT:
          - working_file_path: Path to temp markdown file
          - business_name, website

          TASK:
          1. Visit company website
          2. Extract:
             - Industry/category
             - Employee count (estimate from About/Team pages)
             - Year founded
             - Services/products offered
             - Company description (1-2 sentences)
             - Technologies used (check source code, BuiltWith, etc.)
             - Social media links (LinkedIn, Twitter, Facebook)
          3. Visit LinkedIn company page (if found)
          4. Apply ICP scoring:
             - B2B? (+2 if yes)
             - Employee count 2-200? (+2 if yes, +0 if unknown, -2 if >200)
             - Has website? (+2, already confirmed)
             - US-based? (+1 if yes)
             - Growth signals? (+1 if hiring, recent funding, news)
             - Modern tech stack? (+1 if yes)
          5. Calculate total score (min 5/10 to qualify)
          6. Update working file:
             - Replace "## Company Research" section with findings
             - Add ICP score

          If score < 5:
          - Add "DISQUALIFIED: ICP score {score}/10 (minimum 5 required)"
          - Update search-history.md: Move this business to "Completed (disqualified)" section
          - Delete working file
          - Exit with should_import: false

          OUTPUT:
          - icp_score: Number (0-10)
          - should_import: true if score >= 5, false otherwise
          - company_data: All extracted info
        orchestratorInstructions: Research company website, apply ICP scoring, update working file. Disqualify if score < 5.
        successCriteria: Company research complete, ICP score calculated
        completionContract: Exit with should_import=true/false and company data
  - id: node-1775000000007
    type: workflow
    position:
      x: 400
      y: 820
    data:
      subtype: agent
      category: agent
      label: Research Owners/Decision Makers
      config:
        agentId: owner-researcher
        agentName: Owner/Decision Maker Research Agent
        additionalPrompt: |
          Find and research company owners/decision makers.

          INPUT:
          - working_file_path
          - business_name, website, company_data
          - should_import (from previous node)

          TASK (only if should_import=true):
          1. Search for decision makers:
             - LinkedIn: "{company_name} CEO founder owner president CTO"
             - Company website: About/Team pages
             - Google: "{company_name} owner founder"
          2. For EACH decision maker found (max 3):
             - Full name (first, last)
             - Title/role
             - Email (if findable - check website, LinkedIn, email patterns)
             - LinkedIn profile URL
             - Phone (if findable)
             - Bio/background (1 sentence)
          3. Prioritize: CEO > Founder > Owner > President > CTO
          4. Update working file:
             - Replace "## Owner/Decision Maker Research" section
             - List each person with all details
             - Mark primary_contact: true for the most senior person

          OUTPUT:
          - people: Array of person objects
            - firstName, lastName, title, email, linkedin, phone, bio, isPrimaryContact
          - should_import: true (carried forward)

          If should_import=false from previous node:
          - Skip research, exit immediately with should_import: false
        orchestratorInstructions: Find decision makers (CEO/founder/owner), extract contact info, update working file.
        successCriteria: Decision makers identified and documented
        completionContract: Exit with people array and should_import flag
  - id: node-1775000000008
    type: workflow
    position:
      x: 400
      y: 940
    data:
      subtype: agent
      category: agent
      label: Import to Twenty CRM
      config:
        agentId: crm-importer
        agentName: CRM Import Agent
        additionalPrompt: |
          Import company and people to Twenty CRM.

          INPUT:
          - working_file_path
          - business_name, website, phone, address
          - company_data: Industry, employee_count, description, etc.
          - people: Array of decision makers
          - should_import

          TASK (only if should_import=true):
          1. Create company in Twenty CRM:
             - Use: sulla local_merchant_protocol/twenty
             - POST /rest/companies
             - Body:
               {
                 "name": "{business_name}",
                 "domainName": {"primaryLinkUrl": "{website}", "primaryLinkLabel": "{website}"},
                 "address": "{address}",
                 "employees": {employee_count or null},
                 "description": "{company_description}",
                 "industry": "{industry}"
               }
             - Capture returned company UUID

          2. For EACH person in people array:
             - POST /rest/people
             - Body:
               {
                 "name": {"firstName": "{firstName}", "lastName": "{lastName}"},
                 "emails": {"primaryEmail": "{email or null}"},
                 "phones": [{"number": "{phone or null}", "type": "WORK"}],
                 "companyId": "{company_UUID}",
                 "jobTitle": "{title}",
                 "linkedin": "{linkedin or null}",
                 "decisionLevel": "{isPrimaryContact ? 'primary' : 'secondary'}"
               }

          3. Update working file:
             - Change "## CRM Import Status" to:
               - Company: ✅ Imported (UUID: {uuid})
               - People: ✅ Imported ({count} people)
               - Imported: {current_datetime}

          4. Update search-history.md:
             - Move business from "Currently researching" to "Completed Businesses (in CRM)"
             - Add: "- {business_name} - {website} - Imported {date}"
             - Change "Currently researching: {name}" → "Currently researching: None"
             - Remove the search from "Pending Searches" that we just executed

          5. Move working file:
             - mv ~/sulla/projects/leads/working/{slug}.md → ~/sulla/projects/leads/completed/{slug}.md

          OUTPUT:
          - company_id: UUID from CRM
          - people_imported: Count
          - status: "success"

          If should_import=false:
          - Update search-history: Mark as disqualified
          - Delete working file
          - Exit with status: "disqualified"
        orchestratorInstructions: POST company + people to Twenty CRM. Update search-history. Archive working file.
        successCriteria: Company and people in CRM, search-history updated
        completionContract: Exit with company_id and import status
